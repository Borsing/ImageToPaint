# Caps the whole multipart request body, so an oversized upload is rejected before it reaches the resource.
quarkus.http.limits.max-body-size=10M

# Formats accepted by @ValidImage after magic-byte sniffing; anything else (TIFF, BMP, ICO...) is rejected.
imagetopaint.image.allowed-formats=png,jpeg,gif
# Guards @ValidImage against decompression-bomb images (tiny file, huge decoded bitmap).
imagetopaint.image.max-pixels=40000000